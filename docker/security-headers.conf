# Security headers applied to ALL responses, including redirects and error
# pages (where CI4's after-filter does not run). CSP stays in the PHP filter;
# `setifempty` avoids duplicating headers the app already sets on rendered pages.
<IfModule mod_headers.c>
    Header always setifempty X-Frame-Options "SAMEORIGIN"
    Header always setifempty X-Content-Type-Options "nosniff"
    Header always setifempty Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # Hide the PHP version banner.
    Header unset X-Powered-By
    Header always unset X-Powered-By
</IfModule>
